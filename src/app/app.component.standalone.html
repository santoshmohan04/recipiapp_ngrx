<mat-sidenav-container class="sidenav-container">
  <mat-sidenav
    #drawer
    class="sidenav"
    fixedInViewport
    [attr.role]="(isHandset$ | async) ? 'dialog' : 'navigation'"
    [mode]="(isHandset$ | async) ? 'over' : 'side'"
    [opened]="(isHandset$ | async) === false">
    
    <mat-toolbar color="primary" class="sidenav-header">
      <mat-icon class="logo-icon">restaurant</mat-icon>
      <span>Recipe Book</span>
    </mat-toolbar>
    
    <mat-nav-list>
      <a mat-list-item routerLink="/recipes" routerLinkActive="active" (click)="closeSidenavOnMobile()">
        <mat-icon matListItemIcon>restaurant_menu</mat-icon>
        <span matListItemTitle>Recipes</span>
      </a>
      
      <a mat-list-item routerLink="/favorites" routerLinkActive="active" (click)="closeSidenavOnMobile()">
        <mat-icon matListItemIcon>favorite</mat-icon>
        <span matListItemTitle>Favorites</span>
      </a>
      
      <a mat-list-item routerLink="/shopping-list" routerLinkActive="active" (click)="closeSidenavOnMobile()">
        <mat-icon matListItemIcon>shopping_cart</mat-icon>
        <span matListItemTitle>Shopping List</span>
      </a>
      
      <mat-divider></mat-divider>
      
      @if (authState$ | async; as authState) {
        @if (authState.user) {
          <a mat-list-item routerLink="/profile" routerLinkActive="active" (click)="closeSidenavOnMobile()">
            <mat-icon matListItemIcon>person</mat-icon>
            <span matListItemTitle>Profile</span>
          </a>
          
          <a mat-list-item (click)="onLogout()">
            <mat-icon matListItemIcon>logout</mat-icon>
            <span matListItemTitle>Logout</span>
          </a>
        } @else {
          <a mat-list-item routerLink="/auth" routerLinkActive="active" (click)="closeSidenavOnMobile()">
            <mat-icon matListItemIcon>login</mat-icon>
            <span matListItemTitle>Login</span>
          </a>
        }
      }
    </mat-nav-list>
  </mat-sidenav>
  
  <mat-sidenav-content>
    <mat-toolbar color="primary" class="top-toolbar">
      <button
        type="button"
        aria-label="Toggle sidenav"
        mat-icon-button
        (click)="drawer.toggle()">
        <mat-icon>menu</mat-icon>
      </button>
      
      <span class="toolbar-title">{{ pageTitle() }}</span>
      
      <span class="spacer"></span>
      
      @if (authState$ | async; as authState) {
        @if (authState.user) {
          <button mat-icon-button [matMenuTriggerFor]="userMenu">
            <mat-icon>account_circle</mat-icon>
          </button>
          <mat-menu #userMenu="matMenu">
            <button mat-menu-item routerLink="/profile">
              <mat-icon>person</mat-icon>
              <span>Profile</span>
            </button>
            <button mat-menu-item (click)="onLogout()">
              <mat-icon>logout</mat-icon>
              <span>Logout</span>
            </button>
          </mat-menu>
        }
      }
    </mat-toolbar>
    
    <main class="main-content">
      <router-outlet></router-outlet>
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
