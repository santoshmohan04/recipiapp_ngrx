<div class="recipe-detail-container">
  @if (recipe()) {
    <mat-card>
      <img mat-card-image [src]="recipe()!.imagePath" [alt]="recipe()!.name" />
      <mat-card-header>
        <mat-card-title>{{ recipe()!.name }}</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <p>{{ recipe()!.description }}</p>
        
        <h3>Ingredients</h3>
        <mat-chip-set>
          @for (ingredient of recipe()!.ingredients; track $index) {
            <mat-chip>
              {{ ingredient.name }} ({{ ingredient.amount }})
            </mat-chip>
          }
        </mat-chip-set>
      </mat-card-content>
      <mat-card-actions>
        <button mat-button [matMenuTriggerFor]="menu">
          <mat-icon>more_vert</mat-icon>
          Manage Recipe
        </button>
        <mat-menu #menu="matMenu">
          <button mat-menu-item (click)="onAddToShoppingList()">
            <mat-icon>shopping_cart</mat-icon>
            <span>To Shopping List</span>
          </button>
          <button mat-menu-item (click)="onEditRecipe()">
            <mat-icon>edit</mat-icon>
            <span>Edit Recipe</span>
          </button>
          <button mat-menu-item (click)="onDeleteRecipe()">
            <mat-icon color="warn">delete</mat-icon>
            <span>Delete Recipe</span>
          </button>
        </mat-menu>
      </mat-card-actions>
    </mat-card>
  } @else {
    <mat-card>
      <mat-card-content>
        <p>Recipe not found</p>
      </mat-card-content>
    </mat-card>
  }
</div>
